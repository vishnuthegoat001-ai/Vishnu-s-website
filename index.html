    <title>Vishnu Quest RPG</title>
</head>

    text-align:center;
    padding:20px;
">

<h1>⚔️ VISHNU QUEST RPG ⚔️</h1>

<div id="stats">

    🪙 Coins: 0 |
    🎒 Inventory: Empty |
    👑 Class: None
</div>

<br>

<div id="game" style="
    max-width:700px;
    margin:auto;
    background-color:#2b2b40;
    padding:30px;
    border-radius:20px;
">

<h2>Choose Your Class</h2>

<button onclick="chooseClass('Warrior',120,'Sword')">
⚔️ Warrior
</button>

<br><br>

<button onclick="chooseClass('Mage',90,'Magic Staff')">

<button onclick="chooseClass('Code King',110,'Laptop')">

</div>

<script>

let health = 100;
let coins = 0;
let inventory = [];
let playerClass = "";

function updateStats() {

    document.getElementById("stats").innerHTML =
    "❤️ Health: " + health +
    " | 🪙 Coins: " + coins +
    " | 🎒 Inventory: " +
    (inventory.length ? inventory.join(", ") : "Empty") +
    " | 👑 Class: " + playerClass;

}

function chooseClass(name,hp,item){

    playerClass = name;
    health = hp;
    inventory.push(item);

    updateStats();

    mainMenu();

}

function mainMenu(){

    document.getElementById("game").innerHTML =

    "<h2>🌍 Where will you go?</h2>" +

    "<button onclick='forest()'>🌲 Forest</button><br><br>" +

    "<button onclick='village()'>🏘️ Village</button><br><br>" +

    "<button onclick='cave()'>🐉 Dragon Cave</button><br><br>" +

    "<button onclick='boss()'>👑 Final Boss</button>";

}

function forest(){

    coins += 50;

    updateStats();

    document.getElementById("game").innerHTML =

    "<h2>🌲 Forest</h2>" +

    "<p>You found a treasure chest!</p>" +

    "<p>🪙 You gained 50 coins!</p>" +

    "<button onclick='mainMenu()'>Back</button>";

}

function village(){

    document.getElementById("game").innerHTML =

    "<h2>🏘️ Village Shop</h2>" +

    "<p>Buy something!</p>" +

    "<button onclick='buySword()'>⚔️ Sword (50 Coins)</button><br><br>" +

    "<button onclick='buyPotion()'>🧪 Potion (30 Coins)</button><br><br>" +

    "<button onclick='mainMenu()'>Back</button>";

}
