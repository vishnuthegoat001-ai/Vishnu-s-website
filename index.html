<!DOCTYPE html>
<html>
<head>
    <title>VishnuGPT</title>
</head>

<body style="background-color:#202123; color:white; font-family:Arial;">

    <h1 style="text-align:center;">🤖 VishnuGPT</h1>

    <p style="text-align:center;">
        Ask me HTML questions!
    </p>

    <div id="chat" style="
        width:80%;
        margin:auto;
        border:1px solid gray;
        border-radius:15px;
        padding:20px;
        min-height:250px;
        background-color:#343541;
    ">
    </div>

    <div style="text-align:center; margin-top:20px;">

        <input
            id="question"
            placeholder="Ask VishnuGPT an HTML question..."
            style="
                width:60%;
                padding:12px;
                border-radius:20px;
                border:none;
            "
        >

        <button
            onclick="askVishnuGPT()"
            style="
                padding:12px;
                border-radius:20px;
            "
        >
            Ask
        </button>

    </div>

    <script>

        function askVishnuGPT() {

            var question =
                document.getElementById("question").value;

            question =
                question.toLowerCase().trim();

            var answer;

            if (question === "what is html") {

                answer =
                "HTML stands for HyperText Markup Language. It is used to build websites.";

            }

            else if (question === "what is href") {

                answer =
                "href tells the browser where a link should go.";

            }

            else if (question === "what is src") {

                answer =
                "src tells the browser where an image comes from.";

            }

            else if (question === "what is h1") {

                answer =
                "h1 creates a big heading.";

            }

            else if (question === "what is p") {

                answer =
                "p creates a paragraph.";

            }

            else if (question === "what is img") {

                answer =
                "img is used to display images on a webpage.";

            }

            else {

                answer =
                "Sorry! I'm still learning HTML.";

            }

            document.getElementById("chat").innerHTML +=

                "<p><b>You:</b> " +
                question +
                "</p>" +

                "<p><b>VishnuGPT:</b> " +
                answer
